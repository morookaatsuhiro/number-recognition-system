<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>注册界面</title>
    <script src="js/vue.js"></script>
    <script src="js/axios-0.18.0.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #f8f8f8;
        }
        #app {
            text-align: center;
            max-width: 350px;
            padding: 40px;
            background-color: #ffffff;
            border: 1px solid #e0e0e0;
            box-shadow: 0px 0px 15px rgba(0, 0, 0, 0.2);
            border-radius: 8px;
        }
        h2 {
            margin-bottom: 20px;
            font-size: 24px;
        }
        .input-group {
            display: flex;
            align-items: center;
            margin-bottom: 15px;
        }
        label {
            width: 80px;
            text-align: right;
            margin-right: 10px;
            font-size: 16px;
        }
        input[type="text"], input[type="password"] {
            flex: 1;
            padding: 8px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 16px;
        }
        button {
            width: 100%;
            padding: 12px;
            font-size: 16px;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        button:hover {
            opacity: 0.9;
        }
        .login-link {
            margin-top: 10px;
            font-size: 14px;
        }
        .error-text {
            color: red;
        }
    </style>
</head>
<body>
<div id="app">
    <h2>注册</h2>
    <div class="input-group">
        <label for="username">用户名:</label>
        <input type="text" id="username" v-model="username" placeholder="请输入您的用户名">
        <p v-if="usernameError" class="error-text">用户名应为8-12位的数字和大小写字母</p>
    </div>
    <div class="input-group">
        <label for="email">邮箱:</label>
        <input type="text" id="email" v-model="email" placeholder="请输入您的邮箱">
    </div>
    <div class="input-group">
        <label for="password">密码:</label>
        <input type="password" id="password" v-model="password" placeholder="请输入密码">
        <p v-if="passwordError" class="error-text">密码应为6-16位数字、字母或下划线</p>
    </div>
    <div class="input-group">
        <label for="confirmPassword">确认密码:</label>
        <input type="password" id="confirmPassword" v-model="confirmPassword" placeholder="请再次输入密码">
    </div>
    <button @click="register">注册</button>

    <div class="login-link">
        已有账号？ <a href="login.html">登录</a>
    </div>
</div>

<script>
    new Vue({
        el: '#app',
        data() {
            return {
                username: '',
                email: '',
                password: '',
                confirmPassword: '',
                usernameError: false,
                passwordError: false
            };
        },
        watch: {
            username(value) {
                const usernamePattern = /^[A-Za-z0-9]{8,12}$/;
                this.usernameError = !usernamePattern.test(value);
            },
            password(value) {
                const passwordPattern = /^[A-Za-z0-9_]{6,16}$/;
                this.passwordError = !passwordPattern.test(value);
            }
        },
        methods: {
            register() {
                if (this.password !== this.confirmPassword) {
                    alert('密码和确认密码不一致，请重试！');
                    return;
                }
                axios.post('http://localhost:8080/api/register', {
                    username: this.username,
                    email: this.email,
                    password: this.password
                })
                    .then(() => {
                        alert('注册成功！');
                        window.location.href = 'login.html';
                    })
                    .catch(error => {
                        console.error('注册失败:', error);
                        alert('注册失败，请重试！');
                    });
            }
        }
    });
</script>
</body>
</html>
